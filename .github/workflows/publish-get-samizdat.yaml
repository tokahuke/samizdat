name: Publish get-samizdat

# Build all binaries for every supported (os, arch) target, lay them
# into the get-samizdat collection's dist tree, sign a fresh edition
# from CI, announce, and poll the public testbed until it has
# eager-fetched the new content.
#
# Cross-compilation is via cargo-zigbuild on an ubuntu-latest runner.
# The macOS SDK comes from `install/src/rust/MacOSX14.5.tar.xz` (an
# in-tree tarball). No docker images, no python builder.
#
# Trust trade-off: this puts the series private key in reach of CI,
# which is a wider blast radius than "key on the publisher's
# workstation only". See `docs/deferred.md` "Publisher persistence"
# for the long-term fix.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build from (default: stable)"
        required: false
        default: stable

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    env:
      ZIG_VERSION: "0.13.0"
      NODE_PORT: "4510"
      DATA_DIR: /tmp/samizdat-publish-data

    steps:
      # Deploy key for the get-samizdat submodule (the public release
      # repo). Installed BEFORE checkout because the recursive
      # submodule clone needs it.
      - name: Install get-samizdat deploy key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.GET_SAMIZDAT_DEPLOY_KEY }}
          known_hosts: placeholder
          if_key_exists: replace

      - name: Scan github.com host key
        run: ssh-keyscan -H github.com >> ~/.ssh/known_hosts

      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          submodules: false
          persist-credentials: false

      # actions/checkout sets `url.https://github.com/.insteadOf
      # git@github.com:`, which converts the submodule's SSH URL to
      # HTTPS and skips our deploy key. Drop the rewrite, fetch
      # manually.
      - name: Fetch get-samizdat submodule over SSH
        run: |
          git config --global --unset-all url.https://github.com/.insteadOf || true
          git submodule update --init --recursive

      - name: Install Rust toolchain + cross targets
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-gnu, x86_64-pc-windows-gnu, aarch64-apple-darwin

      # Cache zig itself (extracted tarball) and the cargo-zigbuild
      # binary separately from the cargo target dir. Both are
      # invariant to our code: zig is keyed on ZIG_VERSION, the
      # cargo-zigbuild binary on a bump-on-purpose tag.
      - name: Cache zig
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: ~/zig
          key: zig-linux-${{ env.ZIG_VERSION }}

      - name: Install zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p ~/zig
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" \
            | tar -xJf - -C ~/zig --strip-components=1

      - name: Put zig on PATH
        run: |
          echo "$HOME/zig" >> "$GITHUB_PATH"
          "$HOME/zig/zig" version

      - name: Cache cargo-zigbuild binary
        id: cache-zigbuild
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-zigbuild
          key: cargo-zigbuild-${{ runner.os }}-v1

      - name: Install cargo-zigbuild
        if: steps.cache-zigbuild.outputs.cache-hit != 'true'
        run: cargo install cargo-zigbuild --locked

      - name: Extract macOS SDK
        run: |
          set -e
          sudo mkdir -p /opt/sdks
          sudo tar -xJf install/src/rust/MacOSX14.5.tar.xz -C /opt/sdks
          ls /opt/sdks
          echo "SDKROOT=/opt/sdks/MacOSX14.5.sdk" >> $GITHUB_ENV

      # Cargo.lock fingerprint that ignores workspace-local entries.
      # A version-only bump on `[workspace.package].version` rewrites
      # the version lines of every workspace member's `[[package]]`
      # block in Cargo.lock, but those blocks have no `source = ...`
      # line (they are path deps). Hashing only blocks WITH `source`
      # gives a key that is invariant to workspace version bumps and
      # changes only when an actual external dep moves.
      - name: Compute deps-only Cargo.lock fingerprint
        id: deps_fp
        run: |
          set -e
          fp=$(awk 'BEGIN{RS="\n\n";ORS="\n\n"} /^\[\[package\]\]/ && /source = / {print}' Cargo.lock \
               | sha256sum | cut -d' ' -f1)
          echo "fp=$fp" >> "$GITHUB_OUTPUT"
          echo "deps fingerprint: $fp"

      - name: Cache cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ steps.deps_fp.outputs.fp }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Cache cargo target dir
        uses: actions/cache@v4
        with:
          path: target
          key: target-publish-multi-${{ runner.os }}-${{ steps.deps_fp.outputs.fp }}
          restore-keys: |
            target-publish-multi-${{ runner.os }}-

      - name: Build for x86_64-unknown-linux-gnu
        # Full daemon set on Linux: node + hub + proxy + cli + samizdat-up.
        run: |
          cargo zigbuild --release --target x86_64-unknown-linux-gnu \
            -p samizdat-up \
            -p samizdat \
            -p samizdat-node \
            -p samizdat-hub \
            -p samizdat-proxy

      - name: Build for x86_64-pc-windows-gnu
        # Node + cli + samizdat-up only. Hub and proxy have unix-only
        # deps that do not cross-compile.
        run: |
          cargo zigbuild --release --target x86_64-pc-windows-gnu \
            -p samizdat-up \
            -p samizdat \
            -p samizdat-node

      - name: Build for aarch64-apple-darwin
        run: |
          cargo zigbuild --release --target aarch64-apple-darwin \
            -p samizdat-up \
            -p samizdat \
            -p samizdat-node

      - name: Lay out dist/
        run: |
          set -e
          VERSION="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "VERSION=$VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          REPO_ROOT="${{ github.workspace }}"
          DIST="$REPO_ROOT/install/get-samizdat/dist"
          # Wipe only the `latest/` alias and the current-version
          # slot (in case of a re-publish of the same version);
          # prior `dist/<version>/` subtrees are kept so they remain
          # in the next signed edition and stay installable from the
          # network. The submodule's git history is the authoritative
          # backup if anything ever goes missing locally.
          rm -rf "$DIST/latest" "$DIST/$VERSION"
          mkdir -p "$DIST"

          # place(triple, ext, component, file_basename) -> places into
          # dist/<version>/<triple>/<component>/<file_basename><ext> AND
          # dist/latest/<triple>/<component>/<file_basename><ext>.
          place() {
            local triple="$1" ext="$2" component="$3" base="$4"
            local src="$REPO_ROOT/target/$triple/release/${base}${ext}"
            if [ ! -f "$src" ]; then
              echo "missing: $src" >&2
              exit 1
            fi
            for tag in latest "$VERSION"; do
              local dst="$DIST/$tag/$triple/$component"
              mkdir -p "$dst"
              cp "$src" "$dst/${base}${ext}"
            done
          }

          # Linux x86_64: all five binaries.
          place x86_64-unknown-linux-gnu ""    samizdat-up samizdat-up
          place x86_64-unknown-linux-gnu ""    node        samizdat-node
          place x86_64-unknown-linux-gnu ""    node        samizdat
          place x86_64-unknown-linux-gnu ""    hub         samizdat-hub
          place x86_64-unknown-linux-gnu ""    proxy       samizdat-proxy

          # Windows x86_64: samizdat-up + node + cli (hub/proxy
          # not cross-compilable today).
          place x86_64-pc-windows-gnu    ".exe" samizdat-up samizdat-up
          place x86_64-pc-windows-gnu    ".exe" node        samizdat-node
          place x86_64-pc-windows-gnu    ".exe" node        samizdat

          # macOS aarch64: same shape as Windows (no hub/proxy).
          place aarch64-apple-darwin     ""    samizdat-up samizdat-up
          place aarch64-apple-darwin     ""    node        samizdat-node
          place aarch64-apple-darwin     ""    node        samizdat

          # Bootstrap shim: a tiny shell script served at the root of
          # the collection. Users curl-pipe-sh this; it detects their
          # OS+arch, fetches the right samizdat-up, places it in
          # /usr/local/bin, and prints what to do next.
          for tag in latest "$VERSION"; do
            mkdir -p "$DIST/$tag"
            sed -e "s/__VERSION__/$VERSION/g" \
                "$REPO_ROOT/install/src/install.sh.template" \
                > "$DIST/$tag/install.sh"
            chmod 755 "$DIST/$tag/install.sh"
          done

          echo "--- dist tree (top 40) ---"
          find "$DIST" -type f | sort | head -40
          echo "--- install.sh head ---"
          head -5 "$DIST/latest/install.sh"

      # Re-template Samizdat.rb in the homebrew tap. The mac
      # samizdat-up binary's sha256 changes every build, so the
      # formula's pinned sha is stale right after we publish unless
      # we update it. Clone the tap via its own deploy key, replace
      # the formula, push.
      - name: Refresh homebrew tap formula
        run: |
          set -e
          VERSION="${VERSION}"
          MAC_BIN="install/get-samizdat/dist/${VERSION}/aarch64-apple-darwin/samizdat-up/samizdat-up"
          SHA="$(sha256sum "$MAC_BIN" | awk '{print $1}')"
          echo "version=$VERSION sha=$SHA"

          # Install the tap's deploy key into a separate ssh agent
          # entry. Cannot reuse the get-samizdat key because deploy
          # keys are repo-scoped.
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}" > ~/.ssh/id_homebrew_tap
          chmod 600 ~/.ssh/id_homebrew_tap

          TAP_DIR="$(mktemp -d)"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/id_homebrew_tap -o StrictHostKeyChecking=no" \
            git clone git@github.com:tokahuke/homebrew-samizdat.git "$TAP_DIR"

          sed \
            -e "s|__VERSION__|$VERSION|g" \
            -e "s|__SHA256__|$SHA|g" \
            install/src/Samizdat.rb.template \
            > "$TAP_DIR/Samizdat.rb"

          cd "$TAP_DIR"
          git -c user.email="<>" -c user.name="samizdat-builder" \
              commit -a -m "release: bump to $VERSION (sha=$SHA)"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/id_homebrew_tap -o StrictHostKeyChecking=no" \
            git push origin main
          rm -f ~/.ssh/id_homebrew_tap

      - name: Materialise series private key
        run: |
          mkdir -p install/get-samizdat
          printf '%s' "${{ secrets.GET_SAMIZDAT_PRIV }}" | base64 -d \
            > install/get-samizdat/.Samizdat.priv
          chmod 600 install/get-samizdat/.Samizdat.priv

      - name: Start samizdat-node (publishing)
        run: |
          mkdir -p "$DATA_DIR"
          nohup target/x86_64-unknown-linux-gnu/release/samizdat-node \
            --data "$DATA_DIR" \
            --port "$NODE_PORT" \
            > /tmp/samizdat-node.log 2>&1 &
          echo $! > /tmp/samizdat-node.pid

      - name: Wait for node + connect to testbed hub
        env:
          CLI: target/x86_64-unknown-linux-gnu/release/samizdat
        run: |
          for i in $(seq 1 30); do
            if "$CLI" --data "$DATA_DIR" up >/dev/null 2>&1; then
              echo "Node ready after ${i}s"
              break
            fi
            sleep 1
          done
          if ! "$CLI" --data "$DATA_DIR" up; then
            echo "Node never came up; tail of log:"
            tail -50 /tmp/samizdat-node.log
            exit 1
          fi
          # GH runners are IPv4-only; UseBoth times out trying IPv6
          # first. The HTTP API expects the CamelCase variant name.
          "$CLI" --data "$DATA_DIR" hub new testbed.hubfederation.com EnsureIpv4
          sleep 5

      - name: Import + commit edition
        env:
          CLI: ${{ github.workspace }}/target/x86_64-unknown-linux-gnu/release/samizdat
        working-directory: install/get-samizdat
        run: |
          "$CLI" --data "$DATA_DIR" import
          "$CLI" --data "$DATA_DIR" commit --release

      - name: Install testbed SSH key (for diagnostics)
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.TESTBED_SSH_KEY }}
          name: id_testbed
          known_hosts: placeholder
          if_key_exists: replace

      # Two-phase mirror wait:
      #
      #  1. Poll for the linux samizdat-up binary. Its sha changes
      #     every build, so a match really means "the testbed received
      #     the announcement and finished fetching this object". Once
      #     it matches, federation + fetch path are proven.
      #
      #  2. Then poll, more loosely, every other critical artifact
      #     until they all 200. The testbed's eager-fetch runs them in
      #     parallel; we just need to keep the publisher node alive
      #     until they all land. If a curl times out, that means the
      #     testbed is still federated-fetching from us, which is the
      #     whole point of staying online a bit longer.
      - name: Wait for testbed to mirror
        run: |
          BASE="https://proxy.hubfederation.com/~get-samizdat/latest"

          # Phase 1: sha-match on linux samizdat-up.
          LOCAL_PATH="install/get-samizdat/dist/latest/x86_64-unknown-linux-gnu/samizdat-up/samizdat-up"
          EXPECTED_SHA=$(sha256sum "$LOCAL_PATH" | awk '{print $1}')
          echo "phase 1: expecting sha256=$EXPECTED_SHA"
          for i in $(seq 1 60); do
            GOT_SHA=$(curl -sS --max-time 30 "$BASE/x86_64-unknown-linux-gnu/samizdat-up/samizdat-up" | sha256sum | awk '{print $1}')
            if [ "$GOT_SHA" = "$EXPECTED_SHA" ]; then
              echo "phase 1 ok after $((i*5))s"
              break
            fi
            echo "phase 1 attempt $i: got sha=$GOT_SHA, retrying"
            sleep 5
            if [ $i -eq 60 ]; then
              echo "phase 1 timeout" >&2
              exit 1
            fi
          done

          # Phase 2: poll every remaining published file until 200.
          paths=(
            "install.sh"
            "x86_64-unknown-linux-gnu/node/samizdat-node"
            "x86_64-unknown-linux-gnu/node/samizdat"
            "x86_64-unknown-linux-gnu/hub/samizdat-hub"
            "x86_64-unknown-linux-gnu/proxy/samizdat-proxy"
            "aarch64-apple-darwin/samizdat-up/samizdat-up"
            "aarch64-apple-darwin/node/samizdat-node"
            "aarch64-apple-darwin/node/samizdat"
            "x86_64-pc-windows-gnu/samizdat-up/samizdat-up.exe"
            "x86_64-pc-windows-gnu/node/samizdat-node.exe"
            "x86_64-pc-windows-gnu/node/samizdat.exe"
          )
          # The testbed needs ~60s per object in the worst case (its
          # `query_with_retry` is bounded by Duration::from_secs(60)
          # per object, but objects fetch in parallel).
          deadline=$((SECONDS + 300))
          while [ $SECONDS -lt $deadline ]; do
            remaining=()
            for p in "${paths[@]}"; do
              code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 30 "$BASE/$p" || echo "000")
              if [ "$code" != "200" ]; then
                remaining+=("$p")
              fi
            done
            if [ ${#remaining[@]} -eq 0 ]; then
              echo "phase 2 ok: all paths served"
              exit 0
            fi
            echo "phase 2: ${#remaining[@]} paths still missing -- ${remaining[*]}"
            sleep 10
          done
          echo "phase 2 timeout: paths still missing: ${remaining[*]}" >&2
          exit 1
          echo "Testbed did not mirror within 5 minutes; investigate." >&2
          tail -100 /tmp/samizdat-node.log
          ssh -i ~/.ssh/id_testbed -o StrictHostKeyChecking=no \
            root@${{ secrets.TESTBED_HOST }} bash -s <<'EOSSH' || true
            set +e
            echo "--- ss -ulnp ---"
            ss -ulnp | head -20
            echo "--- samizdat hub ls ---"
            samizdat hub ls 2>&1
            echo "--- samizdat subscription ls ---"
            samizdat subscription ls 2>&1
            echo "--- journalctl samizdat-node ---"
            journalctl -u samizdat-node --no-pager -n 60
          EOSSH
          exit 1

      - name: Tear down
        if: always()
        run: |
          if [ -f /tmp/samizdat-node.pid ]; then
            kill "$(cat /tmp/samizdat-node.pid)" 2>/dev/null || true
          fi
          rm -f install/get-samizdat/.Samizdat.priv
