name: Bootstrap testbed

# One-shot deployment that turns a fresh DigitalOcean droplet (just
# stood up by `terraform apply`) into a running Samizdat hub + node +
# proxy. Out-of-band by necessity: an empty droplet has nothing to
# serve itself yet. After this runs once, subsequent updates go
# through `update-testbed.yaml`, which calls `samizdat-up update`
# on the droplet.
#
# Mechanism: build locally, scp the build tree to the droplet as a
# `file://` dist, then run `samizdat-up install` on the droplet to do
# the service registration + lifecycle. Same code path that an
# outside user would hit; this just bypasses the proxy fetch since
# the proxy isn't up yet.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build from (default: stable)."
        required: false
        default: stable

jobs:
  bootstrap:
    name: Bootstrap
    runs-on: ubuntu-latest
    env:
      TARGET: x86_64-unknown-linux-gnu
      REMOTE_DIST: /tmp/samizdat-dist
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          submodules: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Cache cargo target dir
        uses: actions/cache@v4
        with:
          path: target
          key: target-bootstrap-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            target-bootstrap-${{ runner.os }}-

      - name: Build samizdat-up + all daemons
        run: |
          cargo build --release --target $TARGET \
            -p samizdat-up \
            -p samizdat \
            -p samizdat-node \
            -p samizdat-hub \
            -p samizdat-proxy

      - name: Lay out local dist/
        # samizdat-up `install --from file://<path>` expects the dist
        # tree at <path>/<version>/<triple>/<component>/<binary>.
        # Bootstrap only needs the testbed's linux x86_64 slice.
        run: |
          set -e
          STAGE=/tmp/bootstrap-dist
          rm -rf "$STAGE"
          for tag in latest; do
            BASE="$STAGE/$tag/x86_64-unknown-linux-gnu"
            mkdir -p "$BASE/samizdat-up" "$BASE/node" "$BASE/hub" "$BASE/proxy"
            cp target/$TARGET/release/samizdat-up      "$BASE/samizdat-up/"
            cp target/$TARGET/release/samizdat-node    "$BASE/node/"
            cp target/$TARGET/release/samizdat         "$BASE/node/"
            cp target/$TARGET/release/samizdat-hub     "$BASE/hub/"
            cp target/$TARGET/release/samizdat-proxy   "$BASE/proxy/"
          done
          ls -la "$STAGE/latest/x86_64-unknown-linux-gnu/"

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.TESTBED_SSH_KEY }}
          known_hosts: placeholder
          if_key_exists: replace

      - name: Trust testbed host key
        run: ssh-keyscan -H "${{ secrets.TESTBED_HOST }}" >> ~/.ssh/known_hosts

      # Upload the build tree first, then samizdat-up itself, then run
      # samizdat-up to do the install. The droplet's login shell is
      # fish, so multi-line scripts pipe through `bash -s`.
      - name: Upload dist + samizdat-up
        run: |
          set -e
          REMOTE=root@${{ secrets.TESTBED_HOST }}
          ssh $REMOTE bash -s <<REMOTE_EOF
            set -e
            mkdir -p $REMOTE_DIST
            rm -rf $REMOTE_DIST/*
          REMOTE_EOF
          scp -r /tmp/bootstrap-dist/* $REMOTE:$REMOTE_DIST/
          scp target/$TARGET/release/samizdat-up $REMOTE:/usr/local/bin/samizdat-up.new
          ssh $REMOTE bash -s <<REMOTE_EOF
            set -e
            chmod 755 /usr/local/bin/samizdat-up.new
            mv /usr/local/bin/samizdat-up.new /usr/local/bin/samizdat-up
          REMOTE_EOF

      - name: samizdat-up install (node + hub + proxy)
        run: |
          ssh root@${{ secrets.TESTBED_HOST }} bash -s <<REMOTE_EOF
            set -e
            samizdat-up install node  --from file://$REMOTE_DIST
            samizdat-up install hub   --from file://$REMOTE_DIST
            samizdat-up install proxy --from file://$REMOTE_DIST
          REMOTE_EOF

      - name: Render + apply testbed proxy.toml
        # samizdat-up's default proxy.toml has https=false / example.org.
        # The testbed needs the real domain so Let's Encrypt works.
        # Overlay the templated config and restart the proxy.
        env:
          DOMAIN: ${{ secrets.PROXY_DOMAIN }}
          PROXY_OWNER_EMAIL: ${{ secrets.PROXY_OWNER_EMAIL }}
        run: |
          set -e
          envsubst < install/src/x86_64-unknown-linux-gnu/testbed/proxy.toml.template \
            > /tmp/proxy.toml
          scp /tmp/proxy.toml root@${{ secrets.TESTBED_HOST }}:/etc/samizdat/proxy.toml
          ssh root@${{ secrets.TESTBED_HOST }} systemctl restart samizdat-proxy

      - name: Subscribe to seed collections
        # Idempotent: the CLI errors loudly on duplicate entries with
        # the new error-propagating semantics, so `|| true` per call
        # keeps re-runs clean.
        run: |
          ssh root@${{ secrets.TESTBED_HOST }} bash -s <<REMOTE_EOF
            set +e
            samizdat hub new testbed.hubfederation.com UseBoth
            samizdat subscription new r0Km0HptEt6Fhosmy7qxaKxyDtwHkzi0-eYbt1WatdM
            samizdat subscription new fGfgc7ibvwy26U7nHjcaAhYmyLvXl84Ld-qab_0PPJc
            true
          REMOTE_EOF
