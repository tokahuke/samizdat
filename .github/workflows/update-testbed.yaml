name: Update testbed

# Recurring update for the testbed droplet. The droplet pulls its new
# binaries from the samizdat network it already participates in, so
# this workflow just ssh's in and runs `samizdat-up update`.
#
# Run after a successful `publish-get-samizdat.yaml`. The publish
# workflow itself waits for the testbed to mirror the new edition
# before exiting, so by the time you dispatch this one, the binaries
# are already in the testbed's local node cache and `samizdat-up
# update` fetches them via the loopback.

on:
  workflow_dispatch:

jobs:
  update:
    name: Update
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.TESTBED_SSH_KEY }}
          known_hosts: placeholder
          if_key_exists: replace

      - name: Scan host key
        run: ssh-keyscan -H "${{ secrets.TESTBED_HOST }}" >> ~/.ssh/known_hosts

      - name: samizdat-up update
        run: ssh root@${{ secrets.TESTBED_HOST }} samizdat-up update
