name: Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    # Deploy key for the get-samizdat submodule. Installing it BEFORE
    # checkout means the recursive submodule clone (over SSH per
    # `.gitmodules`) succeeds; postbuild.sh's `git push` also uses
    # this key because git inherits the SSH agent.
    - name: Install get-samizdat deploy key
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.GET_SAMIZDAT_DEPLOY_KEY }}
        known_hosts: placeholder
        if_key_exists: replace

    - name: Scan github.com host key
      run: ssh-keyscan -H github.com >> ~/.ssh/known_hosts

    - name: Check out repository code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        # No `token:` here -- the main repo is fetched via the default
        # GITHUB_TOKEN (read-only is fine; nothing pushes into it), and
        # the submodule's SSH URL picks up the deploy key from the
        # agent installed above.
        persist-credentials: false

    - name: Setup git for committing
      run: |
        git config --global user.email "<>"
        git config --global user.name "CI Builder"

    - name: Install poetry
      run: pipx install poetry
    
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
        cache: poetry

    - name: Setup virtualenv
      run: cd install && poetry install

    # The rust builder bind-mounts the host's `~/.cargo` into the
    # container. Caching it across runs gives us a free dep download
    # shortcut on warm builds. The key is keyed on every Cargo.lock so
    # a dep bump invalidates; the restore-keys let unrelated bumps reuse
    # most of the cache.
    - name: Cache cargo registry + git
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          cargo-${{ runner.os }}-

    - name: Run install builder
      run: cd install && poetry run python builder

    - name: Done
      run: echo Done
